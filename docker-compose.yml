services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_strong_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_net

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: trading_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_net

  # ---- Backend API ----
  backend:
    profiles: ["dryrun", "testnet", "production"]
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: trading_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: ${NODE_ENV:-production}
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - trading_net

  # ---- Frontend Dashboard ----
  dashboard:
    profiles: ["dryrun", "testnet", "production"]
    build:
      context: ./dashboard
      dockerfile: ../docker/Dockerfile.dashboard
    container_name: trading_dashboard
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:3001}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      DASHBOARD_API_TOKEN: ${DASHBOARD_API_TOKEN:-}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    networks:
      - trading_net

volumes:
  postgres_data:
  redis_data:

networks:
  trading_net:
    driver: bridge
